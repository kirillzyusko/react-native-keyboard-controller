name: 🦊 Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama
        run: |
          ollama serve &
          sleep 5

      - name: Pull model
        run: |
          ollama pull gemma4

      - name: Get diff
        run: |
          git fetch origin main
          git diff origin/main...HEAD > diff.patch

      - name: Run LLM review
        run: |
          PROMPT="
          You are a senior engineer doing STRICT code review.

          CRITICAL RULE:
          You must NOT show your reasoning, thinking process, or analysis steps.
          You must output only final results.

          Rules:
          - Output MAX 2 issues
          - Only report REAL, HIGH-CONFIDENCE issues
          - Ignore style, naming, formatting, and micro-optimizations
          - Ignore generic best practices
          - DO NOT suggest improvements unless it's a real bug
          - If no real issues — output EXACTLY: LGTM
          - If unsure — output: LGTM

          Bad examples (forbidden):
          - 'use env variables'
          - 'improve performance'
          - 'refactor this'
          - anything generic

          Good examples:
          - broken CI command
          - invalid shell usage
          - incorrect assumptions
          - command will fail

          Format:

          1. **Title**
          **Why**: ...
          **Fix**: ...

          $(cat diff.patch)
          "

          RESPONSE=$(curl -s http://localhost:11434/api/generate \
            -d "$(jq -n --arg prompt "$PROMPT" '{
              model: "gemma4",
              prompt: $prompt,
              stream: false
            }')")

          echo "$RESPONSE" | jq -r '.response' > review.txt

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('review.txt', 'utf8');

            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body
            });
