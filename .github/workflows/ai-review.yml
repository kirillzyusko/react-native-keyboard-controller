name: 🦊 Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama
        run: |
          ollama serve &
          sleep 5

      - name: Pull model
        run: |
          ollama pull gemma4:26b

      - name: Get diff
        run: |
          git fetch origin main
          git diff origin/main...HEAD > diff.patch

      - name: Run LLM review
        run: |
          RESPONSE=$(ollama run gemma4:26b "
          You are a senior staff engineer doing a STRICT code review.

          CRITICAL RULE:
          You must NOT show your reasoning, thinking process, or analysis steps.
          You must output only final results.

          ---

          TASK:
          Find at most 2 REAL, HIGH-CONFIDENCE bugs in the diff.

          Only report issues that will cause:
          - CI failure
          - runtime error
          - incorrect behavior
          - security vulnerability

          ---

          STRICT RULES:
          - Output MAX 2 issues
          - If no critical bugs: output exactly "LGTM"
          - Do NOT provide explanations of your thinking
          - Do NOT simulate step-by-step reasoning
          - Do NOT rewrite code unless explicitly necessary
          - Do NOT include diffs or patches

          ---

          FORBIDDEN:
          - "thinking..."
          - "let's analyze"
          - "self-correction"
          - reasoning traces
          - suggestions unrelated to bugs

          ---

          OUTPUT FORMAT:

          Issue 1:
          Title: ...
          Why: ...
          Fix: ...

          OR:

          LGTM

          ---

          $(cat diff.patch)
          " --no-stream)

          echo "$RESPONSE" > review.txt

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('review.txt', 'utf8');

            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body
            });
